<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery — We Photograph</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a href="index.html" class="logo">We <span>Photograph</span></a>
        <nav class="nav-main" aria-label="Primary">
          <a href="index.html">Home</a>
          <a href="gallery.html" class="active">Gallery</a>
          <a href="locations.html">Locations</a>
          <a href="contact.html">Contact</a>
          <a href="shooting.html">Shooting</a>
        </nav>
      </div>
    </header>

    <main class="wrap">
      <header class="page-head">
        <h1>Gallery</h1>
        <p>A straight list of photographs — no categories, just the work.</p>
      </header>

      <div class="gallery-grid">
        <figure class="gallery-item">
          <button type="button" class="gallery-item__trigger" aria-label="Enlarge: Mountain landscape at sunset">
            <img
              src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=900&q=80"
              alt="Mountain landscape at sunset"
              loading="lazy"
              width="900"
              height="675"
            />
          </button>
        </figure>
        <figure class="gallery-item">
          <button type="button" class="gallery-item__trigger" aria-label="Enlarge: Forest path with morning light">
            <img
              src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=900&q=80"
              alt="Forest path with morning light"
              loading="lazy"
              width="900"
              height="675"
            />
          </button>
        </figure>
        <figure class="gallery-item">
          <button type="button" class="gallery-item__trigger" aria-label="Enlarge: Fog over hills">
            <img
              src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=900&q=80"
              alt="Fog over hills"
              loading="lazy"
              width="900"
              height="675"
            />
          </button>
        </figure>
        <figure class="gallery-item">
          <button type="button" class="gallery-item__trigger" aria-label="Enlarge: Lake and mountains">
            <img
              src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=900&q=80"
              alt="Lake and mountains"
              loading="lazy"
              width="900"
              height="675"
            />
          </button>
        </figure>
        <figure class="gallery-item">
          <button type="button" class="gallery-item__trigger" aria-label="Enlarge: Snowy mountain peaks">
            <img
              src="https://images.unsplash.com/photo-1519681393784-d120267933ba?w=900&q=80"
              alt="Snowy mountain peaks"
              loading="lazy"
              width="900"
              height="675"
            />
          </button>
        </figure>
        <figure class="gallery-item">
          <button type="button" class="gallery-item__trigger" aria-label="Enlarge: Alpine ridge">
            <img
              src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=900&q=80"
              alt="Alpine ridge"
              loading="lazy"
              width="900"
              height="675"
            />
          </button>
        </figure>
        <figure class="gallery-item">
          <button type="button" class="gallery-item__trigger" aria-label="Enlarge: Waterfall in green forest">
            <img
              src="https://images.unsplash.com/photo-1433086966358-54859d0ed716?w=900&q=80"
              alt="Waterfall in green forest"
              loading="lazy"
              width="900"
              height="675"
            />
          </button>
        </figure>
        <figure class="gallery-item">
          <button type="button" class="gallery-item__trigger" aria-label="Enlarge: Green meadow and sky">
            <img
              src="https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=900&q=80"
              alt="Green meadow and sky"
              loading="lazy"
              width="900"
              height="675"
            />
          </button>
        </figure>
        <figure class="gallery-item">
          <button type="button" class="gallery-item__trigger" aria-label="Enlarge: Sunlight through trees">
            <img
              src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=900&q=80"
              alt="Sunlight through trees"
              loading="lazy"
              width="900"
              height="675"
            />
          </button>
        </figure>
        <figure class="gallery-item">

              width="900"
              height="675"
            />
          </button>
        </figure>
        <figure class="gallery-item">
          <button type="button" class="gallery-item__trigger" aria-label="Enlarge: Misty forest">
            <img
              src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=900&q=80"
              alt="Misty forest"
              loading="lazy"

              height="675"

        </figure>
        <figure class="gallery-item">
          <button type="button" class="gallery-item__trigger" aria-label="Enlarge: Northern lights over snow">

              alt="Northern lights over snow"

              width="900"
              height="675"
            />
          </button>
        </figure>
      </div>
    </main>

    <div
      id="gallery-lightbox"
      class="lightbox"
      role="dialog"
      aria-modal="true"
      aria-label="Enlarged photograph"
      hidden
    >
      <button type="button" class="lightbox__backdrop" aria-label="Close"></button>
      <button type="button" class="lightbox__arrow lightbox__arrow--prev" aria-label="Previous image">
        <svg width="28" height="28" viewBox="0 0 24 24" aria-hidden="true">
          <path
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            stroke-linecap="square"
            d="M14 6L8 12l6 6"
          />
        </svg>
      </button>
      <button type="button" class="lightbox__arrow lightbox__arrow--next" aria-label="Next image">
        <svg width="28" height="28" viewBox="0 0 24 24" aria-hidden="true">
          <path
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            stroke-linecap="square"
            d="M10 6l6 6-6 6"
          />
        </svg>
      </button>
      <figure class="lightbox__frame" aria-live="polite">
        <button type="button" class="lightbox__close">Close</button>
        <img
          class="lightbox__img"
          src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
          alt=""
        />
      </figure>
    </div>

    <footer class="site-footer">
      <p>© We Photograph. Cyprus.</p>
    </footer>

    <script src="js/gallery.js" defer></script>
  </body>
</html>
