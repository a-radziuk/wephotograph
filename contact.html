<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact — We Photograph</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a href="index.html" class="logo">We <span>Photograph</span></a>
        <nav class="nav-main" aria-label="Primary">
          <a href="index.html">Home</a>
          <a href="gallery.html">Gallery</a>
          <a href="locations.html">Locations</a>
          <a href="contact.html" class="active">Contact</a>
          <a href="shooting.html">Shooting</a>
        </nav>
      </div>
    </header>

    <main class="wrap">
      <header class="page-head">
        <h1>Contact</h1>
        <p>Tell us about your project, timeline, and any references you love.</p>
      </header>

      <div class="panel form-grid panel--pad">
        <!-- Replace YOUR_FORM_ID with a Formspree form ID from https://formspree.io for hosted submissions -->
        <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
          <div class="form-group">
            <label for="contact-name">Name</label>
            <input id="contact-name" type="text" name="name" required autocomplete="name" placeholder="Your name" />
          </div>
          <div class="form-group">
            <label for="contact-email">Email</label>
            <input id="contact-email" type="email" name="email" required autocomplete="email" placeholder="you@email.com" />
          </div>
          <div class="form-group">
            <label for="contact-message">Message</label>
            <textarea id="contact-message" name="message" required placeholder="What are you looking for?"></textarea>
          </div>
          <div class="form-group" style="display: none" aria-hidden="true">
            <input type="text" name="_gotcha" tabindex="-1" autocomplete="off" />
          </div>
          <div class="form-group">
            <button type="submit" class="btn">Send message</button>
          </div>
        </form>
      </div>
    </main>

    <footer class="site-footer">
      <p>© We Photograph. Cyprus.</p>
    </footer>
  </body>
</html>
